name: Release

# Publishes pmr to PyPI when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API token or secret required.
# One-time setup on PyPI: add a Trusted Publisher for project "pmr" pointing at
#   owner: mhadifilms, repo: pmr, workflow: release.yml   (environment: leave blank)
# PyPI supports a "pending publisher", so configure it before the first upload.

on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # hatch-vcs derives the version from the tag
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check artifacts
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
